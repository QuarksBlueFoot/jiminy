[workspace]
members = [
    ".",
    "examples/jiminy-vault",
    "examples/jiminy-escrow",
    "bench/pinocchio-vault",
    "bench/jiminy-vault",
    "bench/anchor-vault",
]
exclude = [
    "bench/runner",
]
resolver = "2"

[workspace.lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(target_os, values("solana"))','cfg(target_arch, values("bpf"))'] }

[workspace.dependencies]
pinocchio = { version = "0.10", features = ["cpi"] }
pinocchio-system = "0.5"
pinocchio-token = "0.5"
sha2-const-stable = "0.1"
jiminy = { path = "." }

[package]
name = "jiminy"
version = "0.9.0"
edition = "2021"
license = "Apache-2.0"
authors = ["MoonManQuark"]
description = "Complete safety toolkit for pinocchio Solana programs. Pyth oracle readers, AMM math (isqrt, constant-product), balance delta guards, close revival sentinels, staking reward accumulators, vesting schedules, M-of-N multisig, safe CPI wrappers, account checks, token/mint readers, Token-2022 screening, CPI reentrancy guards, DeFi math (u128), slippage, events, introspection, ed25519, authority handoff, merkle proofs. Zero-copy, no_std, no proc macros."
repository = "https://github.com/QuarksBlueFoot/jiminy"
homepage = "https://github.com/QuarksBlueFoot/jiminy"
readme = "README.md"
keywords = ["solana", "pinocchio", "bpf", "zero-copy", "anchor"]
categories = ["no-std", "embedded"]
exclude = [".github", "*.sh", "examples", "bench", "docs", "BENCHMARKS.md"]

[lib]
name = "jiminy"

[dependencies]
pinocchio = { workspace = true }
pinocchio-system = { workspace = true }
pinocchio-token = { workspace = true }
sha2-const-stable = { workspace = true }

[features]
default = ["programs"]
programs = []
log = []

[lints]
workspace = true
