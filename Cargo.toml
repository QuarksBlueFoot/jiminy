[workspace]
members = [
    ".",
    "crates/jiminy-core",
    "crates/jiminy-solana",
    "crates/jiminy-finance",
    "crates/jiminy-lending",
    "crates/jiminy-staking",
    "crates/jiminy-vesting",
    "crates/jiminy-multisig",
    "crates/jiminy-distribute",
    "examples/jiminy-vault",
    "examples/jiminy-escrow",
    "bench/pinocchio-vault",
    "bench/jiminy-vault",
    "bench/anchor-vault",
]
exclude = [
    "bench/runner",
]
resolver = "2"

[workspace.lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(target_os, values("solana"))','cfg(target_arch, values("bpf"))'] }

[workspace.dependencies]
pinocchio = { version = "0.10", features = ["cpi"] }
pinocchio-system = "0.5"
pinocchio-token = "0.5"
sha2-const-stable = "0.1"
jiminy = { path = "." }
jiminy-core = { path = "crates/jiminy-core" }
jiminy-solana = { path = "crates/jiminy-solana" }
jiminy-finance = { path = "crates/jiminy-finance" }
jiminy-lending = { path = "crates/jiminy-lending" }
jiminy-staking = { path = "crates/jiminy-staking" }
jiminy-vesting = { path = "crates/jiminy-vesting" }
jiminy-multisig = { path = "crates/jiminy-multisig" }
jiminy-distribute = { path = "crates/jiminy-distribute" }

[package]
name = "jiminy"
version = "0.10.0"
edition = "2021"
license = "Apache-2.0"
authors = ["MoonManQuark"]
description = "Safety toolkit for pinocchio Solana programs. Compute budget guards, flash-loan detection, CPI return data, program upgrade verification, TWAP accumulators, lending/liquidation math, dust-safe distribution, Pyth oracle readers, AMM math, balance delta guards, close revival sentinels, staking rewards, vesting, multisig, CPI wrappers, account checks, token/mint readers, Token-2022 screening, reentrancy guards, DeFi math, slippage, events, introspection, ed25519, authority handoff, merkle proofs. Zero-copy, no_std, no proc macros."
repository = "https://github.com/QuarksBlueFoot/jiminy"
homepage = "https://github.com/QuarksBlueFoot/jiminy"
readme = "README.md"
keywords = ["solana", "pinocchio", "bpf", "zero-copy", "anchor"]
categories = ["no-std", "embedded"]
exclude = [".github", "*.sh", "examples", "bench", "docs", "BENCHMARKS.md"]

[lib]
name = "jiminy"

[dependencies]
pinocchio = { workspace = true }
pinocchio-system = { workspace = true }
pinocchio-token = { workspace = true }
sha2-const-stable = { workspace = true }
jiminy-core = { workspace = true }
jiminy-solana = { workspace = true }
jiminy-finance = { workspace = true }
jiminy-lending = { workspace = true }
jiminy-staking = { workspace = true }
jiminy-vesting = { workspace = true }
jiminy-multisig = { workspace = true }
jiminy-distribute = { workspace = true }

[features]
default = ["programs"]
programs = []
log = []

[lints]
workspace = true
